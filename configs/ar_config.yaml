# EHR-AR configuration — autoregressive next-token pretraining baseline
#
# Deliberately mirrors bert_config.yaml wherever possible so comparisons
# between JEPA, BERT, and AR baselines are fair.

seed: 42

data:
  data_dir: "/home/ag619/clean_meds"
  lookup_dir: "/home/ag619/MIMIC_data/hosp"
  vocab_path: "/home/ag619/EHR-JEPA-Data/vocab.json"
  labels_base_dir: "/home/ag619/EHR-JEPA-Data/labels"
  labels_task: "icu_mortality"
  cache_dir: "/home/ag619/EHR-JEPA-Data/cache"

wandb:
  enabled: true
  project: "EHR-JEPA"
  entity: null

normalizer:
  stats_path: "/home/ag619/EHR-JEPA-Data/normalizer_stats.json"

model:
  d_model: 768
  embedding_type: "learned"
  text_encoder: "emilyalsentzer/Bio_ClinicalBERT"
  code_embeddings_path: "/home/ag619/EHR-JEPA-Data/code_embeddings.pt"
  encoder_hidden_dim: 768
  vocab_size: 5000
  use_value: true
  use_time: true

transformer:
  n_layers: 12
  n_heads: 8
  ffn_dim: 256
  dropout: 0.1

ar:
  # Pack multiple subject trajectories end-to-end per batch row:
  # [CLS|seq1|EOS|CLS|seq2|EOS|…]
  pack_sequences: true

training:
  task: "pretrain"
  max_seq_len: 1024
  batch_size: 128
  gradient_accumulation_steps: 4
  num_workers: 8
  pin_memory: true
  time_unit: "hours"

  lr: 1.0e-4
  weight_decay: 1.0e-2

  scheduler: "cosine_warmup"
  warmup_ratio: 0.05
  min_lr_ratio: 0.1

  grad_clip: 0

  early_stopping_patience: 5
  early_stopping_metric: "val_loss"

  n_epochs: 30

  checkpoint_dir: "/home/ag619/EHR-JEPA-Data/ar_checkpoints"

downstream:
  enabled: false
  inline_probe_during_pretrain: false
  probe_epochs: 6
  probe_lr: 1.0e-3
  probe_dropout: 0.1
  probe_batch_size: 64
  probe_max_files: 5
  probe_interval: 5

downstream_eval:
  mode: ar
  # Causal AR: use "cls" for last-token pooling (config alias); or mean_pool over events
  pooling: cls
  head_type: linear
  head_dropout: 0.2
  run_fraction_sweep: false
  train_fractions: [0.01, 0.05, 0.1, 0.2, 0.5, 1.0]
  val_max_files: 5
  n_epochs: 20
  lr: 1.0e-4
  weight_decay: 0.05
  batch_size: 512
  early_stopping_patience: 3
  grad_clip: 1.0
  label_smoothing: 0
  freeze_backbone: true
  backbone_lr_scale: 0.1
  lr_scheduler: true
  lr_scheduler_patience: 2
  lr_scheduler_factor: 0.5
  wandb_log_train_every: 1
  val_eval_every: 0
  checkpoint_path: null
