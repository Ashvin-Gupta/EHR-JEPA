# EHR-JEPA configuration
#
# All paths can be absolute or relative to the project root.
# Entries marked "reserved" are not yet active but are read by the code
# so they can be toggled without changing source files.

# Set to an integer to fix all random seeds (Python, NumPy, PyTorch, CUDA).
# Set to null to run non-deterministically.
seed: 42

data:
  # Root directory containing train/, tuning/, held_out/ sub-folders of
  # .parquet files.
  data_dir: "/home/ag619/clean_meds"

  # Directory containing MIMIC lookup tables used by MEDSCodeTranslator.
  # Set to null if lookup files are not available (translator falls back
  # to raw code strings).
  lookup_dir: "/home/ag619/MIMIC_data/hosp"  # d_labitems.csv.gz, d_icd_diagnoses.csv.gz, etc.

  # Where the built vocabulary is saved / loaded from.
  vocab_path: "/home/ag619/EHR-JEPA-Data/vocab.json"

  # Base directory that contains one sub-folder per downstream task, each
  # holding three parquet files:
  # Change labels_task to switch between tasks without editing paths.
  labels_base_dir: "/home/ag619/EHR-JEPA-Data/labels"
  labels_task: "icu_mortality"   # e.g. icu_mortality | hospital_mortality | hospital_readmission

  # Directory for pickle caches of parsed subject sequences.
  # On first run, parquet files are read and the result is saved here.
  # On every subsequent run the pickle is loaded directly (much faster).
  # Set to null to disable caching.
  cache_dir: "/home/ag619/EHR-JEPA-Data/cache"

wandb:
  enabled: true
  project: "EHR-JEPA"
  entity: null          # set to your W&B username or team name, e.g. "my-team"

normalizer:
  # Path where fitted normalizer statistics are saved / loaded.
  stats_path: "/home/ag619/EHR-JEPA-Data/normalizer_stats.json"

model:
  # Transformer hidden dimension.  All embedding outputs have this size.
  d_model: 768

  # Embedding mode:
  #   "learned"    — trainable nn.Embedding table, top-5000 vocab + UNK.
  #   "text_based" — frozen ClinicalBERT/BioBERT embeddings + trainable
  #                  linear projection (encoder_hidden_dim → d_model).
  embedding_type: "learned"           # "learned" | "text_based"

  # HuggingFace model name used by scripts/encode_text_embeddings.py.
  # Only relevant for text_based; ignored for learned.
  text_encoder: "emilyalsentzer/Bio_ClinicalBERT"

  # Path to the precomputed embedding tensor (.pt file, shape [vocab_size, hidden_dim]).
  # Required when embedding_type == "text_based".
  code_embeddings_path: "/home/ag619/EHR-JEPA-Data/code_embeddings.pt"

  # Hidden dimension of the text encoder (e.g. 768 for BERT-base).
  # Must match the shape of the .pt file when embedding_type == "text_based".
  encoder_hidden_dim: 768

  # Number of codes to keep when embedding_type == "learned".
  # Ignored when embedding_type == "text_based" (all unique codes are used).
  vocab_size: 5000

  # --- Feature flags (four modes) ---
  #   use_value: false, use_time: false  →  code only         (no MLP, no normalizer)
  #   use_value: true,  use_time: false  →  code + value      (MLP: d_model+3)
  #   use_value: false, use_time: true   →  code + time       (MLP: d_model+1)
  #   use_value: true,  use_time: true   →  code + value + time (MLP: d_model+4)
  use_value: true
  use_time: true

masking:
  # span_budget — random span mask (shared context, multiple targets).
  # causal_single — random context_start s + cut t in [s, end]; context [s,t], target (t,end].
  # causal_future — S independent prefix/future pairs; 1 + S encoder passes.
  strategy: causal_single
  mask_ratio: 0.30
  default_num_spans: 4
  min_span_length: 15
  # Minimum number of events between consecutive spans when allow_overlap=false.
  min_gap_events: 0
  # If true, target spans may overlap (i-JEPA-style).
  # If false, spans are disjoint and cover exactly the mask budget.
  allow_overlap: false
  # --- causal_single / causal_future ---
  min_context_events: 5      # causal_single: min tokens in [context_start, cut t]
  min_target_events: 5       # min future-window events; resample cut until met
  max_cutpoint_resamples: 12
  # --- causal_future only ---
  num_cutpoints_S: 4
  # Target is all events after each cut through window end; distant futures are
  # down-weighted via loss.future_time_decay_lambda (not hard event/hour caps).

transformer:
  n_layers: 6
  n_heads: 8
  ffn_dim: 1024
  dropout: 0.1
  # Context pathway always uses compact extraction with original RoPE position IDs.
  # (context_encoding option removed — extracted_with_positions is now the only mode.)

predictor:
  n_layers: 2
  n_heads: 8
  # Branch selection:
  #   true  — Perceiver-JEPA: cross-attention pooling to fixed latents, latent predictor
  #   false — Token I-JEPA: full-length MASK-at-target predictor; downstream uses CLS
  use_perceiver: false
  # Branch A only: skip target spans shorter than this many tokens
  min_span_for_perceiver: 15
  # causal_single + Branch B (token_predictor on [CLS | context_enc | MASK@targets]):
  #   bidirectional — full self-attention among real tokens (default)
  #   quadrant — CLS/context cannot attend to MASK slots; MASK→CLS+context allowed;
  #              CLS+context block bidirectional; target↔target diagonal only
  #   partial_causal — same off-diagonal blocks as quadrant, but the top-left
  #                    (CLS + context) block is lower-triangular (causal in compact order)
  # Branch B time: per-token hours_since_first (from collator) → HoursSinceFirstEmbedding
  #   added to predictor inputs (on top of RoPE position_ids). No span midpoint/duration.
  causal_single_attn: partial_causal
  # Add a Linear + BatchNorm1d projection head after the target perceiver and
  # predictor outputs.  Breaks the LN unit-sphere constraint and gives the
  # anti-collapse objective (CovReg) a free representation space.  Recommended.
  use_proj_head: true

latent_pooling:
  n_latents: 16

loss:
  # L_total = L_pred + lambda_cov * SIGReg(Z_tgt).  SIGReg is typically O(1);
  # lambda_cov >> 1 (e.g. 100) with grad_clip disabled often blows up weights → NaN.
  # Safer starting range: 0.05–1.0; enable training.grad_clip (e.g. 1.0) if unstable.
  lambda_cov: 0.68 #masking for 0.1 of pred loss
  # Branch B + causal_* masking: per-target-token (vectorized on GPU)
  #   W = max(floor, exp(-future_time_decay_lambda * delta_minutes_since_cut))
  # delta_minutes = wall-clock minutes from cut t to each future event.
  # Replaces hard future_max_events / future_max_hours caps on the target window.
  # 0 = plain unweighted MSE.  Typical lambda: 0.01–0.1 (1/min).
  future_time_decay_lambda: 0.002888
  future_time_decay_weight_floor: 0.05
  # SIGReg: number of random 1D projections per forward (no linear proj dim).
  sigreg_num_slices: 32

training:
  # "pretrain"   — full-sequence JEPA masked pretraining.
  # "prediction" — downstream fine-tuning with ACES labels.
  task: "pretrain"

  # Transformer context window.  Also used for collator windowing / padding.
  max_seq_len: 1024

  batch_size: 96

  # DataLoader parallelism (4–8 workers per GPU is typical; >8 can thrash CPU).
  num_workers: 8
  prefetch_factor: 8
  # LRU cache of vocab-encoded sequences per subject (pretrain only; 0 = off).
  encode_cache_size: 4096

  # Allocate batch tensors in page-locked (pinned) host memory for faster
  # CPU→GPU DMA transfers.  Automatically disabled when running on CPU-only.
  pin_memory: true

  # ---- GPU throughput ----
  use_amp: true              # mixed precision on CUDA (recommended)
  amp_dtype: bf16            # bf16 (Ampere+) or float16
  tf32: true                 # faster FP32 matmul on Ampere+
  cudnn_benchmark: true      # faster conv/attn kernels (slightly less reproducible)
  wandb_log_every_n_steps: 10  # reduce W&B sync overhead (1 = every step)

  # Unit for delta_time before log(1 + x) transform.
  # Only relevant when model.use_time: true.
  time_unit: "hours"

  # ---- Optimiser ----
  lr: 1.0e-4
  weight_decay: 1.0e-2      # L2 regularisation via AdamW

  # ---- LR Scheduler ----
  # Options: "cosine_warmup" | "cosine" | "linear_warmup" | "none"
  # cosine_warmup: linear warm-up for warmup_ratio of steps, then cosine decay
  # cosine:        cosine decay from step 0 (no warm-up)
  # linear_warmup: linear warm-up then constant lr
  scheduler: "cosine_warmup"
  warmup_ratio: 0.05         # fraction of total steps used for warm-up
  min_lr_ratio: 0.1          # lr decays to min_lr_ratio * lr at end of training

  # ---- Gradient clipping ----
  # 0 = no clipping; grad_norm is still logged to W&B every step.
  grad_clip: 0

  # ---- Early stopping ----
  early_stopping_patience: 0   # epochs without improvement before stopping
                                # set to 0 to disable
  # Lower-is-better: val_loss, train_loss. Higher-is-better: val_auroc, val_aupr,
  # accuracy, rank_me, f1 (substring match on metric name).
  early_stopping_metric: "val_loss"   # "val_loss" or "train_loss"

  # RankMe on target embeddings (non-pad rows, random subsample). Recomputed every
  # N optimizer steps; between updates W&B shows the last value (flat segments).
  # 0 = validation epochs only. 1 = every step (more W&B detail, slightly slower).
  rank_me_every_n_steps: 50
  rank_me_train_max_rows: 256

  # JEPA forward debugging (prints on rank 0).  Always logs when l_pred=l_cov=0 if
  # debug_jepa_on_zero_loss is true.
  debug_jepa: false
  debug_jepa_first_batches: 5
  debug_jepa_every_n_steps: 200
  debug_jepa_on_zero_loss: true

  n_epochs: 20

  # Directory where best.pt and last.pt checkpoints are written.
  # Set to "" or omit to disable checkpointing.
  checkpoint_dir: "/home/ag619/EHR-JEPA-Data/Fri22ndMaycausal_single/checkpoints"

# ---------------------------------------------------------------------------
# Inline downstream evaluation
# Run a fresh linear probe serially at the end of every pretraining epoch.
# Metrics are logged to W&B under downstream_task/{data.labels_task}/
# ---------------------------------------------------------------------------
downstream:
  # Set to true to enable.  Requires data.labels_base_dir and data.labels_task.
  enabled: false

  # When false, skip inline linear probe during pretrain even if loaders exist
  # (pretrain-only; final probe test still runs if loaders are built).
  inline_probe_during_pretrain: false

  # Number of epochs to train the linear probe each time it runs.
  probe_epochs: 6

  # Learning rate for the probe's AdamW optimiser.
  probe_lr: 1.0e-3

  # Dropout applied before the linear layer.
  probe_dropout: 0.1

  # Batch size for downstream data (can be larger than pretrain batch_size
  # since no gradients flow through the frozen encoder).
  probe_batch_size: 64

  # Sequence pooling when encoder has no perceiver (token JEPA / BERT):
  #   cls       — [CLS] token (default)
  #   mean_pool — masked mean over event tokens (CLS excluded for BERT)
  pooling: cls

  # Limit the number of source parquet files used for the probe *val* (tuning)
  # DataLoader only.  The probe training loader always uses all files.
  # Reduces inline probe evaluation time on large splits.
  # Set to null to use all available files.
  probe_max_files: 5
  # Run the inline probe every N epochs (epoch 1 always runs regardless).
  # Set to 1 to probe every epoch; set to e.g. 2 to probe every other epoch.
  probe_interval: 5

# Standalone supervised evaluation (python main_supervised_downstream.py --config ...)
# Typical workflow: three separate jobs — (1) pretrain with main.py / torchrun,
# (2) supervised finetuning on full train data, (3) same as (2) but with
# run_fraction_sweep: true to loop over train_fractions.  Jobs (2) and (3) use
# the same script; only this block changes (especially run_fraction_sweep).
downstream_eval:
  # Which encoder setup to fine-tune:
  #   jepa   — JEPA checkpoint: perceiver head if predictor.use_perceiver, else CLS head
  #   scratch — Same architecture as jepa but random init (no checkpoint)
  #   bert   — MLM BERT encoder + CLS head; checkpoint_path required
  mode: jepa

  # Sequence pooling for token JEPA / BERT (ignored when predictor.use_perceiver):
  #   cls       — [CLS] token
  #   mean_pool — masked mean over event tokens
  pooling: mean_pool

  # Classification head on top of pooled (JEPA) or CLS (BERT) features:
  #   linear — Dropout → Linear(d_total → 1)
  #   mlp    — Dropout → Linear → GELU → Dropout → Linear → 1
  head_type: linear
  head_dropout: 0.2          # higher dropout on classification head

  # When false: one run using all training subjects (full probe train split).
  # When true: one run per value in train_fractions (subset of train only; val/test unchanged).
  run_fraction_sweep: false

  # Used only when run_fraction_sweep is true (each fraction is ceil(f * N_train)).
  train_fractions: [0.01, 0.05, 0.1, 0.2, 0.5, 1.0]

  # Tuning val loader: cap number of source parquet files (full held-out test always).
  val_max_files: 5
  n_epochs: 20
  lr: 1.0e-4
  weight_decay: 0.05         # AdamW L2 — helps when train AUROC >> val AUROC
  batch_size: 1024

  # --- Anti-overfitting (supervised finetune) ---
  # Stop if val AUROC does not improve for this many epochs (0 = run all n_epochs).
  early_stopping_patience: 5
  grad_clip: 1.0             # 0 = disabled
  label_smoothing: 0      # 0 = disabled; softens hard 0/1 labels
  # true: train pooler + head only; freeze pretrained embedding + encoder
  freeze_backbone: true
  # When freeze_backbone is false, backbone still uses lr * this scale (discriminative LR)
  backbone_lr_scale: 0.1
  lr_scheduler: true         # ReduceLROnPlateau on val AUROC
  lr_scheduler_patience: 2
  lr_scheduler_factor: 0.5

  # W&B logging: train loss every N optimizer steps (1 = every batch; 50 = less noisy).
  wandb_log_train_every: 1
  # Val eval every N steps; 0 = end of epoch only (recommended — val is a full pass).
  val_eval_every: 0

  # Test evaluation uses weights from the epoch with highest val AUROC (not the last epoch).

  # Optional default checkpoint for supervised jobs (same as CLI --checkpoint).
  # CLI still wins if you pass --checkpoint explicitly.
  checkpoint_path: null
