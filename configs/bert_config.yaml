# EHR-BERT configuration — BERT-style MLM pretraining baseline
#
# Deliberately mirrors ehr_config.yaml wherever possible so comparisons
# between the JEPA and BERT baselines are fair.

seed: 42

data:
  data_dir: "../clean_meds"
  lookup_dir: "../MIMIC_data/hosp"
  vocab_path: "../EHR-JEPA-Data/vocab.json"
  labels_base_dir: "../EHR-JEPA-Data/labels"
  labels_task: "icu_mortality"
  cache_dir: "../EHR-JEPA-Data/cache"

wandb:
  enabled: true
  project: "EHR-JEPA"
  entity: null

normalizer:
  stats_path: "../EHR-JEPA-Data/normalizer_stats.json"

model:
  d_model: 256
  embedding_type: "learned"
  text_encoder: "emilyalsentzer/Bio_ClinicalBERT"
  code_embeddings_path: "../EHR-JEPA-Data/code_embeddings.pt"
  encoder_hidden_dim: 256
  vocab_size: 5000
  use_value: true
  use_time: true

transformer:
  n_layers: 6
  n_heads: 8
  ffn_dim: 1024
  dropout: 0.1

mlm:
  # Total fraction of real tokens selected for masking
  mask_ratio: 0.15
  # Of selected tokens: replaced with [MASK] token
  mask_token_frac: 0.8333    # 12.5 / 15
  # Of selected tokens: replaced with a random vocabulary token
  random_frac: 0.1667        # 2.5 / 15
  # Remainder (0%) are kept unchanged

training:
  task: "pretrain"
  max_seq_len: 1024
  # Per-GPU batch size — kept small to avoid OOM at d_model=768 / seq_len=512.
  # With 4 GPUs and gradient_accumulation_steps=6, effective batch ≈ 96*4=384.
  batch_size: 128
  gradient_accumulation_steps: 4
  num_workers: 8
  pin_memory: true
  time_unit: "hours"

  lr: 1.0e-4
  weight_decay: 1.0e-2

  scheduler: "cosine_warmup"
  warmup_ratio: 0.05
  min_lr_ratio: 0.1

  grad_clip: 0

  early_stopping_patience: 5
  early_stopping_metric: "val_loss"

  n_epochs: 20

  checkpoint_dir: "../EHR-JEPA-Data/bert_checkpoints/6_layer_256"

# ---------------------------------------------------------------------------
# Inline downstream evaluation — same structure as ehr_config.yaml
# ---------------------------------------------------------------------------
downstream:
  enabled: false
  inline_probe_during_pretrain: false
  probe_epochs: 6
  probe_lr: 1.0e-3
  probe_dropout: 0.1
  probe_batch_size: 64
  # Limit val (tuning) loader to N files for fast inline evaluation.
  probe_max_files: 5
  # Run the inline probe every N epochs (epoch 1 always runs regardless).
  probe_interval: 5

# Supervised downstream (main_supervised_downstream.py) — mirror ehr_config downstream_eval
downstream_eval:
  mode: bert
  pooling: mean_pool
  head_type: linear
  head_dropout: 0.2
  run_fraction_sweep: false
  train_fractions: [0.01, 0.05, 0.1, 0.2, 0.5, 1.0]
  val_max_files: 5
  n_epochs: 20
  lr: 1.0e-4
  weight_decay: 0.05
  batch_size: 64
  early_stopping_patience: 3
  grad_clip: 1.0
  label_smoothing: 0
  freeze_backbone: true
  backbone_lr_scale: 0.1
  lr_scheduler: true
  lr_scheduler_patience: 2
  lr_scheduler_factor: 0.5
  wandb_log_train_every: 1
  val_eval_every: 0
  checkpoint_path: null
